name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      - run: uv run python -m compileall backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/package-lock.json
            h5/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: src
      - run: npm run build
        working-directory: src
      - run: npm run lint
        working-directory: src
      - run: npm ci
        working-directory: h5
      - run: npm run build
        working-directory: h5
